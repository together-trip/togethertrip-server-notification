spring:
  config:
    import:
      - optional:classpath:.env[.properties]

  application:
    name: notification

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT}
      password: ${SPRING_REDIS_PASSWORD}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED}
    locations: ${SPRING_FLYWAY_LOCATIONS}
    baseline-on-migrate: true
    baseline-version: 1

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL}

server:
  port: ${SERVER_PORT}

notification:
  sqs:
    queue-url: ${NOTIFICATION_QUEUE_URL:}
    region: ${AWS_REGION}
  push:
    fcm:
      enabled: ${FCM_ENABLED:false}
      project-id: ${FCM_PROJECT_ID:}
      access-token: ${FCM_ACCESS_TOKEN:}
      client-id: ${FCM_CLIENT_ID:}
      client-email: ${FCM_CLIENT_EMAIL:}
      private-key: ${FCM_PRIVATE_KEY:}
      private-key-id: ${FCM_PRIVATE_KEY_ID:}
      token-uri: ${FCM_TOKEN_URI:https://oauth2.googleapis.com/token}
      endpoint: ${FCM_ENDPOINT:https://fcm.googleapis.com}
      timeout: ${FCM_TIMEOUT:PT3S}
