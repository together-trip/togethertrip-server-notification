name: Docker Publish

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

jobs:
  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/togethertrip-server-notification:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/togethertrip-server-notification:${{ github.event.workflow_run.head_sha }}

      - name: Trigger infra service deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: together-trip/togethertrip-infra
          event-type: deploy-service
          client-payload: >-
            {"service":"notification","image_tag":"${{ github.event.workflow_run.head_sha }}","container_registry":"${{ secrets.DOCKERHUB_USERNAME }}"}
